<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Portfolio</title>
    <script>
      // Redirect ke index.html dengan path yang benar
      var pathSegments = location.pathname.split("/");
      var repoName = pathSegments[1]; // Ambil nama repository
      var newPath = "/" + repoName + "/index.html" + location.search;
      location.replace(newPath);
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
